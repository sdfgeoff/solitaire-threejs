<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solitaire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 12px; z-index: 10;
    }
    #ui button {
      padding: 6px 16px; border: none; border-radius: 6px;
      background: #16213e; color: #e0e0e0; font-size: 14px;
      cursor: pointer; border: 1px solid #0f3460;
    }
    #ui button:hover { background: #0f3460; }
    #score {
      position: absolute; top: 12px; right: 20px;
      color: #e0e0e0; font-size: 14px; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="newGame">New Game</button>
    <button id="undo">Undo</button>
  </div>
  <div id="score">Score: 0</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
